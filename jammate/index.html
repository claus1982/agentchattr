<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0e0f1a" />
  <meta name="description" content="JamMate — trova musicisti vicino a te e suona insieme." />
  <title>JamMate — Trova chi suona con te</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Header -->
  <header class="app-header">
    <div class="brand">
      <span class="brand-logo">🎸</span>
      <span class="brand-name">JamMate</span>
    </div>
    <button id="cityBtn" class="city-chip" title="Cambia città">📍 <span id="cityLabel">Milano</span></button>
  </header>

  <!-- Main views -->
  <main id="app"></main>

  <!-- Bottom navigation -->
  <nav class="tabbar" id="tabbar">
    <button class="tab" data-view="discover"><span>🔍</span><small>Scopri</small></button>
    <button class="tab" data-view="board"><span>📌</span><small>Bacheca</small></button>
    <button class="tab fab" data-view="create"><span>＋</span></button>
    <button class="tab" data-view="messages"><span>💬</span><small>Chat</small></button>
    <button class="tab" data-view="profile"><span>🎵</span><small>Profilo</small></button>
  </nav>

  <!-- Modal host -->
  <div id="modalRoot"></div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
